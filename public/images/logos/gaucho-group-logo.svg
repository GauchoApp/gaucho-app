<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="white">
  <!-- GAUCHO text with triangle A -->
  <text x="200" y="42" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="42" font-weight="400" letter-spacing="8" fill="white">G UCHO</text>
  <!-- Triangle Lambda for A - positioned in the gap -->
  <g transform="translate(152, 16)">
    <polygon points="0,24 12,-2 24,24" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="miter"/>
  </g>
  <!-- GROUP -->
  <text x="200" y="72" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="18" font-weight="300" letter-spacing="10" fill="white">GROUP</text>
  <!-- Horizontal lines -->
  <line x1="58" y1="90" x2="148" y2="90" stroke="white" stroke-width="0.6"/>
  <line x1="252" y1="90" x2="342" y2="90" stroke="white" stroke-width="0.6"/>
  <!-- HOLDINGS, INC. -->
  <text x="200" y="96" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="11" font-weight="300" letter-spacing="3.5" fill="white">HOLDINGS, INC.</text>
